
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{padding:1rem 0}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.title{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.75rem 1rem}
.stat-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.stat-value{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.controls{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.controls select,.controls input{font-size:13px;padding:6px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-primary)}
.btn-add{font-size:13px;padding:6px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
.btn-add:hover{background:var(--color-background-secondary)}
.table-wrap{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{background:var(--color-background-secondary);color:var(--color-text-secondary);font-weight:500;font-size:12px;padding:8px 10px;text-align:left;border-bottom:0.5px solid var(--color-border-tertiary)}
td{padding:8px 10px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--color-background-secondary)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.b-vh{background:#FAECE7;color:#993C1D}
.b-hi{background:#FAEEDA;color:#854F0B}
.b-md{background:#E6F1FB;color:#185FA5}
.b-lo{background:#EAF3DE;color:#3B6D11}
.s-done{background:#EAF3DE;color:#3B6D11}
.s-prog{background:#FAEEDA;color:#854F0B}
.s-todo{background:#F1EFE8;color:#5F5E5A}
.s-over{background:#FCEBEB;color:#A32D2D}
.days-red{color:#A32D2D;font-weight:500}
.days-ok{color:#3B6D11;font-weight:500}
.days-warn{color:#BA7517;font-weight:500}
.progress-bar{height:6px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:3px;background:#1D9E75;transition:width .3s}
.task-name{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.editable{cursor:pointer;border-bottom:1px dashed var(--color-border-tertiary)}
.editable:hover{border-bottom-color:var(--color-text-secondary)}
.del-btn{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);padding:2px 4px;border-radius:4px;font-size:14px;opacity:0;transition:opacity .15s}
tr:hover .del-btn{opacity:1}
.del-btn:hover{color:#A32D2D}
select.inline{background:transparent;border:none;color:inherit;font-size:13px;cursor:pointer;padding:0;width:100%}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:10;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1.25rem;width:360px;max-width:95vw}
.modal h3{font-size:16px;font-weight:500;margin-bottom:1rem;color:var(--color-text-primary)}
.field{margin-bottom:.75rem}
.field label{font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:4px}
.field input,.field select{width:100%;font-size:13px;padding:7px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-primary)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.modal-btns button{font-size:13px;padding:7px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
.modal-btns .btn-save{background:#1D9E75;border-color:#1D9E75;color:#fff}
.modal-btns .btn-save:hover{background:#0F6E56}
</style>

<div class="wrap">
  <h2 class="sr-only">Project task tracker with status overview and task list</h2>
  <div class="header">
    <span class="title">Task tracker</span>
    <button class="btn-add" onclick="openModal()"><i class="ti ti-plus" aria-hidden="true"></i> Add task</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Total tasks</div><div class="stat-value" id="s-total">0</div></div>
    <div class="stat"><div class="stat-label">Completed</div><div class="stat-value" id="s-done">0</div></div>
    <div class="stat"><div class="stat-label">In progress</div><div class="stat-value" id="s-prog">0</div></div>
    <div class="stat"><div class="stat-label">Overdue</div><div class="stat-value" id="s-over" style="color:#A32D2D">0</div></div>
  </div>

  <div class="controls">
    <select id="filter-status" onchange="render()">
      <option value="">All statuses</option>
      <option value="To Do">To Do</option>
      <option value="In Progress">In Progress</option>
      <option value="Done">Done</option>
      <option value="Overdue">Overdue</option>
    </select>
    <select id="filter-assignee" onchange="render()">
      <option value="">All assignees</option>
    </select>
    <input type="text" id="search" placeholder="Search tasks..." oninput="render()" style="min-width:150px">
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:22%">Task name</th>
          <th style="width:13%">Phase</th>
          <th style="width:10%">Priority</th>
          <th style="width:12%">Assigned to</th>
          <th style="width:11%">Due date</th>
          <th style="width:9%">Days left</th>
          <th style="width:13%">Status</th>
          <th style="width:10%"></th>
        </tr>
      </thead>
      <tbody id="task-body"></tbody>
    </table>
  </div>

  <div style="margin-top:.75rem">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <span style="font-size:12px;color:var(--color-text-secondary)">Overall completion</span>
      <span style="font-size:12px;font-weight:500;color:var(--color-text-primary)" id="pct-label">0%</span>
    </div>
    <div class="progress-bar" style="height:8px"><div class="progress-fill" id="pct-bar" style="width:0%"></div></div>
  </div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>Add new task</h3>
    <div class="field"><label>Task name</label><input id="m-name" type="text" placeholder="e.g. HW Magazine"></div>
    <div class="field"><label>Phase</label><input id="m-phase" type="text" placeholder="e.g. Corporate"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field"><label>Priority</label>
        <select id="m-priority">
          <option>Very High</option><option>High</option><option>Medium</option><option>Low</option>
        </select>
      </div>
      <div class="field"><label>Assigned to</label><input id="m-assigned" type="text" placeholder="Name"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field"><label>Due date</label><input id="m-due" type="date"></div>
      <div class="field"><label>Status</label>
        <select id="m-status">
          <option>To Do</option><option>In Progress</option><option>Done</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Notes</label><input id="m-notes" type="text" placeholder="Optional notes"></div>
    <div class="modal-btns">
      <button onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="addTask()">Add task</button>
    </div>
  </div>
</div>

<script>
const today = new Date(); today.setHours(0,0,0,0);

let tasks = [
  {id:1,name:"HW Magazine",phase:"Corporate",priority:"Very High",assigned:"Amanda",due:"2026-05-21",status:"In Progress",notes:""},
  {id:2,name:"UGC Ichitan",phase:"Ramein",priority:"Very High",assigned:"Vanessa",due:"",status:"To Do",notes:""},
  {id:3,name:"UGC OT Anggur",phase:"Ramein",priority:"Very High",assigned:"Vanessa",due:"",status:"To Do",notes:""},
  {id:4,name:"Media Visit W Samarinda",phase:"Ramein",priority:"Very High",assigned:"Vanessa",due:"",status:"To Do",notes:""},
  {id:5,name:"SMM Pedimedic",phase:"Ramein",priority:"Very High",assigned:"Vanessa",due:"",status:"To Do",notes:""},
  {id:6,name:"UGC Akasta",phase:"Ramein",priority:"Very High",assigned:"Vanessa",due:"",status:"In Progress",notes:""},
  {id:7,name:"Clipper Phoenix KL",phase:"Corporate",priority:"Very High",assigned:"Tommy",due:"",status:"To Do",notes:""},
  {id:8,name:"Aplikasi Buzzer",phase:"Corporate",priority:"Very High",assigned:"Tommy",due:"",status:"To Do",notes:""}
];
let nextId = 9;

function daysLeft(dueStr){
  if(!dueStr) return null;
  const d = new Date(dueStr); d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

function computeStatus(task){
  if(task.status === "Done") return "Done";
  if(task.due){
    const dl = daysLeft(task.due);
    if(dl !== null && dl < 0) return "Overdue";
  }
  return task.status;
}

function priorityClass(p){
  if(p==="Very High") return "b-vh";
  if(p==="High") return "b-hi";
  if(p==="Medium") return "b-md";
  return "b-lo";
}

function statusClass(s){
  if(s==="Done") return "s-done";
  if(s==="In Progress") return "s-prog";
  if(s==="Overdue") return "s-over";
  return "s-todo";
}

function statusLabel(s){ return s; }

function daysClass(dl){
  if(dl===null) return "";
  if(dl<0) return "days-red";
  if(dl<=3) return "days-warn";
  return "days-ok";
}

function daysText(dl){
  if(dl===null) return "—";
  if(dl===0) return "Today";
  if(dl<0) return dl+" d";
  return "+"+dl+" d";
}

function updateAssigneeFilter(){
  const sel = document.getElementById("filter-assignee");
  const cur = sel.value;
  const names = [...new Set(tasks.map(t=>t.assigned).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">All assignees</option>' + names.map(n=>`<option value="${n}"${n===cur?" selected":""}>${n}</option>`).join("");
}

function updateStats(){
  const computed = tasks.map(t=>computeStatus(t));
  document.getElementById("s-total").textContent = tasks.length;
  document.getElementById("s-done").textContent = computed.filter(s=>s==="Done").length;
  document.getElementById("s-prog").textContent = computed.filter(s=>s==="In Progress").length;
  document.getElementById("s-over").textContent = computed.filter(s=>s==="Overdue").length;
  const pct = tasks.length ? Math.round(computed.filter(s=>s==="Done").length/tasks.length*100) : 0;
  document.getElementById("pct-label").textContent = pct+"%";
  document.getElementById("pct-bar").style.width = pct+"%";
}

function render(){
  const fStatus = document.getElementById("filter-status").value;
  const fAssignee = document.getElementById("filter-assignee").value;
  const fSearch = document.getElementById("search").value.toLowerCase();
  updateStats();
  updateAssigneeFilter();

  let filtered = tasks.filter(t=>{
    const cs = computeStatus(t);
    if(fStatus && cs!==fStatus) return false;
    if(fAssignee && t.assigned!==fAssignee) return false;
    if(fSearch && !t.name.toLowerCase().includes(fSearch) && !t.phase.toLowerCase().includes(fSearch) && !t.assigned.toLowerCase().includes(fSearch)) return false;
    return true;
  });

  const tbody = document.getElementById("task-body");
  if(!filtered.length){
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:var(--color-text-secondary);padding:2rem">No tasks found</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(t=>{
    const dl = daysLeft(t.due);
    const cs = computeStatus(t);
    const dueDisplay = t.due ? t.due.split("-").slice(1).reverse().join("/")+" /"+t.due.split("-")[0].slice(2) : "—";
    return `<tr>
      <td><div class="task-name" title="${t.name}">${t.name}</div></td>
      <td style="color:var(--color-text-secondary)">${t.phase||"—"}</td>
      <td><span class="badge ${priorityClass(t.priority)}">${t.priority}</span></td>
      <td>${t.assigned||"—"}</td>
      <td style="color:var(--color-text-secondary);font-size:12px">${dueDisplay}</td>
      <td><span class="${daysClass(dl)}">${daysText(dl)}</span></td>
      <td>
        <select class="inline ${statusClass(cs)}" style="padding:2px 6px;border-radius:20px;font-size:11px;font-weight:500;border:none" onchange="changeStatus(${t.id},this.value)">
          <option value="To Do"${t.status==="To Do"?" selected":""}>To Do</option>
          <option value="In Progress"${t.status==="In Progress"?" selected":""}>In Progress</option>
          <option value="Done"${t.status==="Done"?" selected":""}>Done</option>
        </select>
      </td>
      <td style="text-align:right"><button class="del-btn" onclick="deleteTask(${t.id})" aria-label="Delete task"><i class="ti ti-trash" aria-hidden="true"></i></button></td>
    </tr>`;
  }).join("");
}

function changeStatus(id, val){
  const t = tasks.find(x=>x.id===id);
  if(t){ t.status = val; render(); }
}

function deleteTask(id){
  tasks = tasks.filter(x=>x.id!==id);
  render();
}

function openModal(){
  document.getElementById("modal-bg").classList.add("open");
  document.getElementById("m-name").focus();
}

function closeModal(){
  document.getElementById("modal-bg").classList.remove("open");
  ["m-name","m-phase","m-assigned","m-due","m-notes"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("m-priority").value="Very High";
  document.getElementById("m-status").value="To Do";
}

function addTask(){
  const name = document.getElementById("m-name").value.trim();
  if(!name){ document.getElementById("m-name").focus(); return; }
  tasks.push({
    id: nextId++,
    name,
    phase: document.getElementById("m-phase").value.trim(),
    priority: document.getElementById("m-priority").value,
    assigned: document.getElementById("m-assigned").value.trim(),
    due: document.getElementById("m-due").value,
    status: document.getElementById("m-status").value,
    notes: document.getElementById("m-notes").value.trim()
  });
  closeModal();
  render();
}

document.getElementById("modal-bg").addEventListener("click", e=>{ if(e.target===e.currentTarget) closeModal(); });

render();
</script>
